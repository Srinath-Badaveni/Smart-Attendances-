<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://i.ibb.co/YTYGn5qV/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapMark – AI Attendance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              violet: {
                50:  '#f5f3ff',
                100: '#ede9fe',
                200: '#ddd6fe',
                300: '#c4b5fd',
                400: '#a78bfa',
                500: '#8b5cf6',
                600: '#7c3aed',
                700: '#6d28d9',
                800: '#5b21b6',
                900: '#4c1d95',
              },
              rose: {
                50:  '#fff1f2',
                100: '#ffe4e6',
                200: '#fecdd3',
                300: '#fda4af',
                400: '#fb7185',
                500: '#f43f5e',
                600: '#e11d48',
                700: '#be123c',
              },
              slate: {
                50:  '#f8fafc',
                100: '#f1f5f9',
                150: '#eef2f7',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
              amber: {
                400: '#fbbf24',
                500: '#f59e0b',
              },
              emerald: {
                400: '#34d399',
                500: '#10b981',
                600: '#059669',
              }
            },
            fontFamily: {
              sans:    ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
              display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
              mono:    ['"JetBrains Mono"', 'monospace'],
            },
            boxShadow: {
              'glow-violet': '0 0 32px rgba(139,92,246,0.25), 0 4px 16px rgba(139,92,246,0.15)',
              'glow-rose':   '0 0 32px rgba(244,63,94,0.25), 0 4px 16px rgba(244,63,94,0.15)',
              'card':        '0 1px 3px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06)',
              'card-hover':  '0 2px 4px rgba(0,0,0,0.06), 0 16px 40px rgba(0,0,0,0.1)',
              'modal':       '0 24px 64px rgba(0,0,0,0.18)',
            },
            backgroundImage: {
              'gradient-violet': 'linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%)',
              'gradient-rose':   'linear-gradient(135deg, #e11d48 0%, #fb7185 100%)',
              'gradient-brand':  'linear-gradient(135deg, #6d28d9 0%, #7c3aed 50%, #a78bfa 100%)',
              'gradient-mesh':   'radial-gradient(at 40% 20%, hsla(262,77%,72%,0.2) 0px, transparent 60%), radial-gradient(at 80% 0%, hsla(330,77%,72%,0.2) 0px, transparent 50%)',
            },
            borderRadius: {
              '4xl': '2rem',
              '5xl': '2.5rem',
            },
            animation: {
              'fade-in':    'fadeIn 0.3s ease',
              'slide-up':   'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
              'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
            },
            keyframes: {
              fadeIn:    { from: { opacity: 0 }, to: { opacity: 1 } },
              slideUp:   { from: { opacity: 0, transform: 'translateY(24px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
              pulseGlow: { '0%,100%': { boxShadow: '0 0 16px rgba(139,92,246,0.3)' }, '50%': { boxShadow: '0 0 32px rgba(139,92,246,0.6)' } },
            }
          }
        }
      }
    </script>
    
    <!-- QR Code library for ShareSubjectModal -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body class="bg-violet-50 text-slate-900 font-sans min-h-screen antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
